type SponsorEmployee {
  id: Int!
  createdAt: DateTime!
  email: String!
  firstName: String!
  lastName: String!
  dateOfBirth: Date!
  gender: Gender!
  role: SponsorEmployeeRole!
  profile: String
  phone: String!
  systemStatus: SystemStatus!
  accountStatus: AccountStatus!
  sponsorId: String!
  sponsor: Sponsor
  sites: [Site]
}

input CreateSponsorEmployeeInput {
  email: String!
  firstName: String!
  lastName: String!
  dateOfBirth: Date!
  gender: Gender
  role: SponsorEmployeeRole!
  profile: String
  phone: String!
  systemStatus: SystemStatus
  accountStatus: AccountStatus
  sponsorId: String!
}

input UpdateSponsorEmployeeInput {
  email: String
  firstName: String
  lastName: String
  dateOfBirth: Date
  gender: Gender
  role: SponsorEmployeeRole
  profile: String
  phone: String
  systemStatus: SystemStatus
  accountStatus: AccountStatus
  sponsorId: String
}

type Query {
  listSponsorEmployee: [SponsorEmployee!]!
  getSponsorEmployee(id: Int!): SponsorEmployee!
}

type Mutation {
  createSponsorEmployee(input: CreateSponsorEmployeeInput!): SuccessResponse!
  updateSponsorEmployee(id: Int!, input: UpdateSponsorEmployeeInput!): SuccessResponse!
  deleteSponsorEmployee(id: Int!): SuccessResponse!
}
