type Sponsor {
  id: ID!
  createdAt: DateTime
  name: String
  abbreviation: String
  description: String
  country: String
  state: String
  city: String
  district: String
  address: String
  zipCode: String
  location: String
  picture: String
  email: String
  phone: String
  type: SponsorType
  employees: [SponsorEmployee!]
  studies: [Study!]
}

input CreateSponsorInput {
  name: String!
  abbreviation: String!
  description: String!
  country: String!
  state: String!
  city: String!
  district: String!
  address: String
  zipCode: String!
  location: String
  picture: String
  email: String!
  phone: String!
  type: SponsorType!
}

input UpdateSponsorInput {
  name: String
  abbreviation: String
  description: String
  country: String
  state: String
  city: String
  district: String
  address: String
  zipCode: String
  location: String
  picture: String
  email: String
  phone: String
  type: SponsorType
}

type Query {
  listSponsor: [Sponsor!]!
  getSponsor(id: ID!): Sponsor!
}

type Mutation {
  createSponsor(input: CreateSponsorInput!): SuccessResponse!
  updateSponsor(id: ID!, input: UpdateSponsorInput!): SuccessResponse!
  deleteSponsor(id: ID!): SuccessResponse!
}
